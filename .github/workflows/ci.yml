name: CI/CD

on:
  push:
    branches:
      - development
      - beta
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci
      
      # Runs your test suite in headless mode first
      - name: Run tests
        run: npm run test:ci

      # This will only run if your tests pass successfully!
      - name: Build library
        run: npm run build angular-inline-svg

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    needs: build
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'beta')
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      issues: write   
      pull-requests: write 
      id-token: write 

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Build library
        run: npm run build angular-inline-svg

      # Updated Semantic Release Step
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Authenticate with GitHub Packages for the exec plugin
          echo "//npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}" >> ~/.npmrc          
          
          # Run Semantic Release
          npx semantic-release