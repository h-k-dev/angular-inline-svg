name: CI/CD

on:
  push:
    branches:
      - development
      - beta
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci
      
      - name: Build library
        run: npm run build angular-inline-svg

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    needs: build
    # Only run release on push to specific branches (not on PRs if you add them later)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create GitHub tags/releases
      issues: write   # Needed for semantic-release to comment on issues
      pull-requests: write # Needed to comment on PRs
      id-token: write # Recommended for npm provenance

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to retrieve git history

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Build library
        run: npm run build angular-inline-svg

      # Let semantic-release handle versioning, changelogs, GitHub releases, and npm publishing!
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release